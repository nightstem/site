name: Deploy preview
run-name: 'Deploy preview for PR #${{ github.event.pull_request.number }}'

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: deploy-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-code-checks:
    name: '🔍 Run code quality checks'
    uses: nightstem/site/.github/workflows/run-code-checks.yml@main
    secrets: inherit

  build-and-deploy:
    name: '🚀 Build and deploy to preview'
    environment: preview
    needs: run-code-checks
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build project
        uses: nightstem/site/.github/actions/build-project@main
        env:
          NEXT_PUBLIC_ENVIRONMENT: preview
          NEXT_PUBLIC_FEATURE_FLAG_HOST: ${{ vars.NEXT_PUBLIC_FEATURE_FLAG_HOST }}
          NEXT_PUBLIC_FEATURE_FLAG_CLIENT_KEY: ${{ vars.NEXT_PUBLIC_FEATURE_FLAG_CLIENT_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean preview helpers
        run: |
          rm -f out/robots.txt
          rm -f out/sitemap.xml
          mv out/robots.staging.txt out/robots.txt

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: nightstem/site/.github/actions/deploy-cloudflare@main
        with:
          environment: preview
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          build-output-directory: ${{ secrets.BUILD_OUTPUT_DIRECTORY }}
          project-name: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        if: github.event_name == 'pull_request'
        with:
          script: |
            const deploymentUrl = '${{ steps.deploy.outputs.deployment-url }}';
            const body = `🚀 **Preview deployment ready!**

            📋 **Preview URL:** ${deploymentUrl}

            💡 This preview environment will be automatically updated when you push new commits to this PR.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
